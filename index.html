<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SunSync</title>
  <meta name="description" content="SunSync legal pages." />
  <meta name="theme-color" content="#FF8A1F" />
  <style>
    :root{
      --text:#1A1A1A;
      --muted:rgba(26,26,26,.72);
      --card:rgba(255,255,255,.76);
      --shadow:0 18px 50px rgba(163,18,47,.12);
      --max:980px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color:var(--text);
      line-height:1.6;
      background:
        radial-gradient(1200px 520px at 50% -10%, rgba(255,215,94,.85), transparent 44%),
        radial-gradient(900px 420px at 15% 5%, rgba(106,168,255,.35), transparent 48%),
        radial-gradient(900px 460px at 85% 0%, rgba(58,115,255,.32), transparent 48%),
        linear-gradient(180deg, #5D8FFF 0%, #8FC0FF 18%, #FFD7A1 45%, #FF9F43 65%, #E64A3B 82%, #A3122F 100%);
      background-attachment:fixed;
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 24px 34px;
    }

    .hero{
      background:var(--card);
      border:1px solid rgba(255,255,255,.30);
      box-shadow:var(--shadow);
      border-radius:28px;
      padding:30px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand-logo{
      width:42px;
      height:42px;
      border-radius:12px;
      object-fit:cover;
      box-shadow:0 10px 26px rgba(58,115,255,.22);
      border:1px solid rgba(255,255,255,.55);
      flex:0 0 auto;
    }
    h1{
      margin:0;
      font-size:32px;
      letter-spacing:-0.03em;
      line-height:1.05;
    }
    p{
      margin:10px 0 0;
      color:var(--muted);
      max-width:680px;
    }

    .links{
      margin-top:24px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .links a{
      text-decoration:none;
      font-weight:700;
      font-size:14px;
      padding:10px 14px;
      border-radius:999px;
      color:rgba(26,26,26,.86);
      background:rgba(255,255,255,.56);
      border:1px solid rgba(26,26,26,.08);
    }
    .links a:hover{
      background:rgba(255,255,255,.72);
    }

    @media (max-width:760px){
      .wrap{ padding:20px 18px 24px; }
      .hero{ border-radius:24px; padding:22px; }
      h1{ font-size:28px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="brand">
        <img class="brand-logo" src="assets/icon.png" alt="SunSync logo" />
        <h1>SunSync</h1>
      </div>
      <p>
        Welcome to SunSync.
      </p>
      <div class="links">
        <a href="terms.html">Terms & Conditions</a>
        <a href="privacy.html">Privacy Policy</a>
      </div>
    </section>
  </main>
</body>
</html>
